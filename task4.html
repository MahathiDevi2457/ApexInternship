<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Product Listing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: #310f1d;
            font-family: 'Inter', sans-serif;
            color: #f5f1e8;
            padding: 0 0 80px;
        }

        .page {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .hero {
            padding: 80px 0 48px;
            border-bottom: 1px solid rgba(245, 241, 232, 0.1);
            margin-bottom: 48px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-weight: 600;
            font-size: 64px;
            margin: 0 0 8px;
            letter-spacing: -0.01em;
        }

        .hero p {
            color: rgba(245, 241, 232, 0.5);
            font-size: 15px;
            margin: 0;
            letter-spacing: 0.02em;
        }

        .controls {
            display: flex;
            gap: 32px;
            margin-bottom: 48px;
            padding-bottom: 20px;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .control-group label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: rgba(245, 241, 232, 0.4);
        }

        .control-group select {
            border: none;
            border-bottom: 1px solid rgba(245, 241, 232, 0.3);
            background: transparent;
            color: #f5e8ed;
            font-size: 14px;
            font-weight: 500;
            padding: 4px 0;
            cursor: pointer;
            outline: none;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 32px;
        }

        .product-card {
            opacity: 0;
            transform: translateY(16px);
            animation: cardIn 0.5s ease forwards;
            cursor: pointer;
        }

        @keyframes cardIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .photo-panel {
            height: 220px;
            border-radius: 4px;
            margin-bottom: 16px;
            overflow: hidden;
            position: relative;
            background: #1a1a1a;
        }

        .photo-panel img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
        }

        .product-card:hover .photo-panel img {
            transform: scale(1.1);
        }

        .category-tag {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: rgba(245, 241, 232, 0.4);
        }

        .product-name {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 600;
            margin: 6px 0 8px;
        }

        .product-price {
            font-size: 16px;
            font-weight: 600;
            color: #c9a227;
            margin: 0 0 6px;
        }

        .stars {
            font-size: 13px;
            letter-spacing: 2px;
        }

        .star-filled {
            color: #c9a227;
        }

        .star-empty {
            color: rgba(245, 241, 232, 0.15);
        }
    </style>
</head>

<body>
    <div class="page">
        <div class="hero">
            <h1>The Collection</h1>
            <p>Curated pieces, filtered your way</p>
        </div>

        <div class="controls">
            <div class="control-group">
                <label for="categoryFilter">Category</label>
                <select id="categoryFilter">
                    <option value="all">All</option>
                    <option value="electronics">Electronics</option>
                    <option value="clothing">Clothing</option>
                    <option value="home">Home</option>
                </select>
            </div>

            <div class="control-group">
                <label for="sortBy">Sort by</label>
                <select id="sortBy">
                    <option value="default">Default</option>
                    <option value="price-asc">Price: Low to High</option>
                    <option value="price-desc">Price: High to Low</option>
                    <option value="rating-desc">Rating: High to Low</option>
                </select>
            </div>
        </div>

        <div class="product-grid" id="productGrid"></div>
    </div>

    <script>
        const products = [
            { name: "Wireless Headphones", category: "electronics", price: 79.99, rating: 4, img: "https://th.bing.com/th/id/OIP.8jaceD7RkCrcGnr3xKfY8wHaHa?w=199&h=200&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3" },
            { name: "Smart Watch", category: "electronics", price: 149.99, rating: 5, img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTKIhldUqWGrjnOi-rnT6-Ix37z6BUyZLHQrpa4fdvv0Q&s=10" },
            { name: "Mechanical Keyboard", category: "electronics", price: 59.99, rating: 4, img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTTXTl2ByPvHhTCyMuXzsEQkwmZ_m43vznBQ6W18a_gFw&s=10" },
            { name: "Denim Jacket", category: "clothing", price: 45.00, rating: 3, img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSQWwNdhA0MHfNOy4-lumeKQYN2UagtHEa1OSZoSzfGt70qNm2NXaR0yHY&s=10" },
            { name: "Cotton T-Shirt", category: "clothing", price: 15.00, rating: 4, img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSm4jC-4bvnXOLFOLJ4NIcsYYoCjEz01fFIKKJRwoJGRQ&s=10" },
            { name: "Wool Sweater", category: "clothing", price: 55.00, rating: 5, img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRDpkJahe_RVf-TmW9XopC2_xAHuGjuAkK2D9jBm6xpPw&s=10" },
            { name: "Ceramic Vase", category: "home", price: 22.00, rating: 4, img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQvn2xVhjs9auOCirO8rssYA2GMT6oWKyD9WKY78hXzkg&s=10" },
            { name: "Table Lamp", category: "home", price: 34.50, rating: 3, img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRcRhjJux1kmW32SToReN8ocqNsZTb_A_lxSVMrHfeT8g&s=10" },
            { name: "Throw Blanket", category: "home", price: 28.00, rating: 5, img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSthE3TdIWhicJuplsaX8pm6u3n61i-rplRtMF3xUGyJQ&s" }
        ]

        const categoryFilter = document.getElementById('categoryFilter')
        const sortBy = document.getElementById('sortBy')
        const productGrid = document.getElementById('productGrid')

        function renderStars(rating) {
            let stars = ''
            for (let i = 1; i <= 5; i++) {
                stars += i <= rating
                    ? '<span class="star-filled">★</span>'
                    : '<span class="star-empty">★</span>'
            }
            return stars
        }

        function render() {
            let filtered = products.filter(p => {
                return categoryFilter.value === 'all' || p.category === categoryFilter.value
            })

            if (sortBy.value === 'price-asc') {
                filtered.sort((a, b) => a.price - b.price)
            } else if (sortBy.value === 'price-desc') {
                filtered.sort((a, b) => b.price - a.price)
            } else if (sortBy.value === 'rating-desc') {
                filtered.sort((a, b) => b.rating - a.rating)
            }

            productGrid.innerHTML = ''
            filtered.forEach((p, i) => {
                const card = document.createElement('div')
                card.className = 'product-card'
                card.style.animationDelay = `${i * 0.05}s`
                card.innerHTML = `
  <div class="photo-panel">
    <img src="${p.img}" alt="${p.name}">
  </div>
  <span class="category-tag">${p.category}</span>
  <h3 class="product-name">${p.name}</h3>
  <div class="product-price">$${p.price.toFixed(2)}</div>
  <div class="stars">${renderStars(p.rating)}</div>
`
                productGrid.appendChild(card)
            })
        }

        categoryFilter.addEventListener('change', render)
        sortBy.addEventListener('change', render)

        render()
    </script>
</body>

</html>
